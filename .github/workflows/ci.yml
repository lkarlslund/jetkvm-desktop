name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    uses: ./.github/workflows/reusable-go-test.yml
    with:
      runner: ${{ matrix.os }}

  build:
    name: Build (${{ matrix.name }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: linux-amd64
            archive_name: jetkvm-desktop-linux-amd64.tar.gz
            client_bin: jetkvm-desktop
            goos: linux
            goarch: amd64
          - os: ubuntu-24.04-arm
            name: linux-aarch64
            archive_name: jetkvm-desktop-linux-aarch64.tar.gz
            client_bin: jetkvm-desktop
            goos: linux
            goarch: arm64
          - os: macos-15-intel
            name: macos-amd64
            archive_name: jetkvm-desktop-macos-amd64.tar.gz
            client_bin: jetkvm-desktop
            goos: darwin
            goarch: amd64
          - os: macos-15
            name: macos-aarch64
            archive_name: jetkvm-desktop-macos-aarch64.tar.gz
            client_bin: jetkvm-desktop
            goos: darwin
            goarch: arm64
          - os: windows-latest
            name: windows-amd64
            archive_name: jetkvm-desktop-windows-amd64.zip
            client_bin: jetkvm-desktop.exe
            goos: windows
            goarch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up native environment
        uses: ./.github/actions/setup-native-env

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build release binaries (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist/pkg
          go build -trimpath -ldflags="-s -w" -o "dist/pkg/${{ matrix.client_bin }}" ./cmd/jetkvm-desktop
          cp README.md dist/pkg/
          tar -C dist/pkg -czf "dist/${{ matrix.archive_name }}" .

      - name: Build release binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          New-Item -ItemType Directory -Force -Path dist/pkg | Out-Null
          $env:CGO_LDFLAGS = "-static-libgcc -static-libstdc++ -static-libssp"
          go build -trimpath -ldflags='-s -w -extldflags "-static-libgcc -static-libstdc++ -static-libssp"' -o "dist/pkg/${{ matrix.client_bin }}" ./cmd/jetkvm-desktop
          Copy-Item README.md dist/pkg/README.md
          Compress-Archive -Path dist/pkg/* -DestinationPath "dist/${{ matrix.archive_name }}"

      - name: Verify Windows runtime dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exe = "dist/pkg/${{ matrix.client_bin }}"
          $imports = & objdump -p $exe |
            Select-String "DLL Name:" |
            ForEach-Object { $_.ToString().Split(":", 2)[1].Trim().ToLowerInvariant() }

          if (-not $imports) {
            throw "Failed to detect imported DLLs for $exe"
          }

          Write-Host "Imported DLLs:"
          $imports | Sort-Object -Unique | ForEach-Object { Write-Host " - $_" }

          $forbidden = @(
            "libstdc++-6.dll",
            "libgcc_s_seh-1.dll",
            "libwinpthread-1.dll",
            "libssp-0.dll"
          )

          $remaining = $imports | Where-Object { $forbidden -contains $_ } | Sort-Object -Unique
          if ($remaining) {
            throw "Windows binary still depends on forbidden MinGW runtime DLLs: $($remaining -join ', ')"
          }

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.archive_name }}
