name: Reusable Go Test

on:
  workflow_call:
    inputs:
      runner:
        required: true
        type: string
      goos:
        required: false
        type: string
        default: ""
      goarch:
        required: false
        type: string
        default: ""

jobs:
  test:
    name: Test
    runs-on: ${{ inputs.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux GUI build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libxxf86vm-dev

      - name: Set up Windows MinGW toolchain
        if: runner.os == 'Windows'
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          release: false
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-gcc-libs

      - name: Prepend Windows MinGW toolchain to PATH
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          MSYS2_LOCATION: ${{ steps.msys2.outputs.msys2-location }}
        run: |
          "$env:MSYS2_LOCATION\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        env:
          GOOS: ${{ inputs.goos }}
          GOARCH: ${{ inputs.goarch }}
        run: xvfb-run -a go test ./...

      - name: Run tests (non-Linux)
        if: runner.os != 'Linux'
        env:
          GOOS: ${{ inputs.goos }}
          GOARCH: ${{ inputs.goarch }}
        run: go test ./...
