name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-amd64
            archive_name: jetkvm-native-linux-amd64.tar.gz
            client_bin: jetkvm-client
            emulator_bin: jetkvm-emulator
          - os: macos-latest
            name: macos-amd64
            archive_name: jetkvm-native-macos-amd64.tar.gz
            client_bin: jetkvm-client
            emulator_bin: jetkvm-emulator
          - os: windows-latest
            name: windows-amd64
            archive_name: jetkvm-native-windows-amd64.zip
            client_bin: jetkvm-client.exe
            emulator_bin: jetkvm-emulator.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build release binaries (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist/pkg
          go build -trimpath -ldflags="-s -w" -o "dist/pkg/${{ matrix.client_bin }}" ./cmd/jetkvm-client
          go build -trimpath -ldflags="-s -w" -o "dist/pkg/${{ matrix.emulator_bin }}" ./cmd/jetkvm-emulator
          cp README.md dist/pkg/
          tar -C dist/pkg -czf "dist/${{ matrix.archive_name }}" .

      - name: Build release binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/pkg | Out-Null
          go build -trimpath -ldflags="-s -w" -o "dist/pkg/${{ matrix.client_bin }}" ./cmd/jetkvm-client
          go build -trimpath -ldflags="-s -w" -o "dist/pkg/${{ matrix.emulator_bin }}" ./cmd/jetkvm-emulator
          Copy-Item README.md dist/pkg/README.md
          Compress-Archive -Path dist/pkg/* -DestinationPath "dist/${{ matrix.archive_name }}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.archive_name }}

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        shell: bash
        run: |
          mkdir -p release
          find dist -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release/ \;
          (cd release && sha256sum * > SHA256SUMS.txt)

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.tar.gz
            release/*.zip
            release/SHA256SUMS.txt
