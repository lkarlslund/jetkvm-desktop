name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  verify-ci:
    name: Verify CI Passed
    runs-on: ubuntu-latest
    outputs:
      run_id: ${{ steps.verify.outputs.run_id }}
    steps:
      - name: Verify successful CI run for this commit
        id: verify
        uses: actions/github-script@v8
        with:
          script: |
            const headSha = context.sha;
            const { owner, repo } = context.repo;
            const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
              owner,
              repo,
              head_sha: headSha,
              per_page: 100
            });

            const ciRun = runs.find((run) =>
              run.name === "CI" &&
              run.status === "completed" &&
              run.conclusion === "success"
            );

            if (!ciRun) {
              core.setFailed(`No successful CI run found for commit ${headSha}. Push the commit to main and wait for CI before tagging a release.`);
              return;
            }

            core.info(`Using CI run ${ciRun.html_url}`);
            core.setOutput('run_id', String(ciRun.id));

  publish:
    name: Publish Release
    needs: verify-ci
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download CI artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run download "${{ needs.verify-ci.outputs.run_id }}" -D dist

      - name: Flatten artifacts
        shell: bash
        run: |
          mkdir -p release
          find dist -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release/ \;
          (cd release && sha256sum * > SHA256SUMS.txt)

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" release/* --clobber
          else
            gh release create "$tag" release/* --title "$tag"
          fi
